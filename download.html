<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parlour – Developer Upload</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #1e293b;
            border-radius: 24px;
            padding: 32px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h2 { margin-top: 0; color: #c084fc; }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
        }
        input {
            background: #334155;
            color: white;
            border: 1px solid #475569;
        }
        button {
            background: #3b82f6;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #2563eb; }
        .error { color: #f87171; margin-top: 10px; }
        .success { color: #4ade80; margin-top: 10px; }
        .hidden { display: none; }
        .info { font-size: 14px; color: #94a3b8; margin-top: 8px; }
        hr { margin: 24px 0; border-color: #334155; }
    </style>
</head>
<body>
<div class="card">
    <h2>🔐 Developer Update Panel</h2>
    <p>Upload a new APK, create GitHub Release, and notify users.</p>

    <input type="password" id="adminPassword" placeholder="Admin Password">
    <button id="loginBtn">Login</button>
    <div id="loginError" class="error"></div>

    <div id="uploadPanel" class="hidden">
        <hr>
        <h3>📤 Publish New Update</h3>
        <input type="text" id="version" placeholder="Version (e.g., 1.0.3)">
        <input type="text" id="githubToken" placeholder="GitHub Personal Access Token (repo scope)">
        <input type="file" id="apkFile" accept=".apk">
        <button id="publishBtn">Upload & Publish</button>
        <div id="message"></div>
        <div class="info">⚠️ Your GitHub token is not stored. Keep it safe. Token needs `repo` scope.</div>
    </div>
</div>

<script>
    // Firebase config (replace with your own if different)
    const firebaseConfig = {
        apiKey: "AIzaSyBDgK7qgbk3p5HN38Tq1siEgfvpPkUCmqA",
        authDomain: "smart-parlour-4d289.firebaseapp.com",
        projectId: "smart-parlour-4d289",
        storageBucket: "smart-parlour-4d289.firebasestorage.app",
        messagingSenderId: "559319368551",
        appId: "1:559319368551:android:43c6de3dc5ce33e37ea5c2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Admin password (change this to something secure)
    const ADMIN_PASS = "admin123";

    // GitHub details - CHANGE THESE TO YOUR REPO
    const GITHUB_OWNER = "gamerffa3";
    const GITHUB_REPO = "Smart-Parlour";

    document.getElementById('loginBtn').onclick = () => {
        const pwd = document.getElementById('adminPassword').value;
        const errorDiv = document.getElementById('loginError');
        if (pwd === ADMIN_PASS) {
            document.getElementById('uploadPanel').classList.remove('hidden');
            errorDiv.innerText = '';
        } else {
            errorDiv.innerText = 'Wrong password';
        }
    };

    document.getElementById('publishBtn').onclick = async () => {
        const version = document.getElementById('version').value.trim();
        const token = document.getElementById('githubToken').value.trim();
        const fileInput = document.getElementById('apkFile');
        const msgDiv = document.getElementById('message');

        if (!version) {
            msgDiv.innerHTML = '❌ Please enter a version number (e.g., 1.0.3)';
            msgDiv.className = 'error';
            return;
        }
        if (!token) {
            msgDiv.innerHTML = '❌ GitHub token required';
            msgDiv.className = 'error';
            return;
        }
        if (!fileInput.files || fileInput.files.length === 0) {
            msgDiv.innerHTML = '❌ Please select an APK file';
            msgDiv.className = 'error';
            return;
        }

        const file = fileInput.files[0];
        if (!file.name.endsWith('.apk')) {
            msgDiv.innerHTML = '❌ File must be .apk';
            msgDiv.className = 'error';
            return;
        }

        msgDiv.innerHTML = '⏳ Creating GitHub Release & uploading APK...';
        msgDiv.className = 'info';

        try {
            // 1. Read file as base64
            const base64 = await readFileAsBase64(file);
            
            // 2. Create a GitHub Release
            const tagName = `v${version}`;
            const releaseResponse = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/releases`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    tag_name: tagName,
                    name: `Version ${version}`,
                    body: `Smart Parlour v${version} – download and install.`,
                    draft: false,
                    prerelease: false
                })
            });

            if (!releaseResponse.ok) {
                const errData = await releaseResponse.json();
                throw new Error(`Release creation failed: ${errData.message}`);
            }

            const release = await releaseResponse.json();
            const uploadUrl = release.upload_url.replace('{?name,label}', `?name=SmartParlour_${version}.apk`);

            // 3. Convert base64 to blob and upload asset
            const binaryString = atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            const blob = new Blob([bytes], { type: 'application/vnd.android.package-archive' });

            const assetResponse = await fetch(uploadUrl, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/vnd.android.package-archive',
                    'Accept': 'application/vnd.github+json'
                },
                body: blob
            });

            if (!assetResponse.ok) {
                const errAsset = await assetResponse.json();
                throw new Error(`Asset upload failed: ${errAsset.message}`);
            }

            const asset = await assetResponse.json();
            const downloadUrl = asset.browser_download_url;

            // 4. Update Firestore
            await db.collection('app_config').doc('update').set({
                latestVersion: version,
                apkDownloadUrl: downloadUrl,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });

            msgDiv.innerHTML = `✅ Success! Version ${version} published.<br>🔗 Download URL: ${downloadUrl}`;
            msgDiv.className = 'success';

            // Clear inputs (keep token for convenience? clear for security)
            document.getElementById('version').value = '';
            document.getElementById('apkFile').value = '';
            // Optionally keep token if admin wants to publish again, but we leave it.

        } catch (err) {
            console.error(err);
            msgDiv.innerHTML = `❌ Error: ${err.message}`;
            msgDiv.className = 'error';
        }
    };

    function readFileAsBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => {
                const result = reader.result;
                const base64 = result.split(',')[1];
                resolve(base64);
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }
</script>
</body>
</html>
