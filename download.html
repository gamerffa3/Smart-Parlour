<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parlour – Download Latest APK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px 24px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 12px;
            color: #c084fc;
        }
        .version {
            background: #334155;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            color: #e2e8f0;
            display: inline-block;
            margin-bottom: 20px;
        }
        .info {
            color: #94a3b8;
            margin-bottom: 24px;
            font-size: 15px;
        }
        .download-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            margin: 16px 0;
        }
        .download-btn:hover:not(:disabled) {
            transform: scale(1.02);
        }
        .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .loader {
            border: 3px solid #334155;
            border-top: 3px solid #10b981;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            margin: 20px 0;
            font-size: 14px;
        }
        .error {
            color: #f87171;
        }
        .success {
            color: #4ade80;
        }
        hr {
            border-color: #334155;
            margin: 20px 0;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>📱 Smart Parlour</h1>
    <div id="versionInfo" class="version">Checking for latest release...</div>
    <div class="info">
        The latest version is ready.<br>
        Click below to download the APK.
    </div>
    <button id="downloadButton" class="download-btn" disabled>⏳ Loading...</button>
    <div id="statusMessage" class="status"></div>
    <div id="apkUrlDisplay" class="apk-url"></div>
    <hr>
    <div style="font-size: 12px; color: #475569;">
        Direct from GitHub Releases<br>
        Always the latest APK – no manual updates needed.
    </div>
</div>

<script>
    // GitHub repo details – CHANGE THESE to your repo
    const GITHUB_OWNER = "gamerffa3";
    const GITHUB_REPO = "Smart-Parlour";

    async function getLatestApk() {
        const versionSpan = document.getElementById('versionInfo');
        const downloadBtn = document.getElementById('downloadButton');
        const statusDiv = document.getElementById('statusMessage');
        const urlDiv = document.getElementById('apkUrlDisplay');

        versionSpan.innerText = 'Fetching latest release...';
        downloadBtn.disabled = true;
        downloadBtn.innerText = '⏳ Connecting to GitHub...';

        try {
            // 1. Get the latest release from GitHub API
            const releaseUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/releases/latest`;
            const response = await fetch(releaseUrl);
            if (!response.ok) {
                if (response.status === 404) throw new Error('No releases found. Create a release first.');
                throw new Error(`GitHub API error: ${response.status}`);
            }
            const release = await response.json();
            const tagName = release.tag_name; // e.g., "v1.0.3"
            const version = tagName.startsWith('v') ? tagName.slice(1) : tagName;

            // 2. Find the first APK asset
            const assets = release.assets;
            const apkAsset = assets.find(asset => asset.name.endsWith('.apk'));
            if (!apkAsset) {
                throw new Error('No APK file found in the latest release. Please upload an APK.');
            }
            const downloadUrl = apkAsset.browser_download_url;

            // 3. Display and enable download
            versionSpan.innerText = `📦 Version ${version}`;
            urlDiv.innerText = `Download URL: ${downloadUrl}`;
            downloadBtn.disabled = false;
            downloadBtn.innerText = `⬇️ Download APK v${version}`;
            downloadBtn.onclick = () => {
                window.location.href = downloadUrl;
                statusDiv.innerHTML = '✅ Download started! Check your notifications.';
                statusDiv.className = 'status success';
            };
        } catch (err) {
            console.error(err);
            versionSpan.innerText = '⚠️ Update unavailable';
            downloadBtn.disabled = true;
            downloadBtn.innerText = 'No APK found';
            statusDiv.innerHTML = `❌ ${err.message}`;
            statusDiv.className = 'status error';
            urlDiv.innerText = '';
        }
    }

    getLatestApk();
</script>
</body>
</html>
