<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Smart Parlour – Download Update</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px 24px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 12px;
            color: #c084fc;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .version {
            background: #334155;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            color: #e2e8f0;
            display: inline-block;
            margin-bottom: 20px;
        }
        .info {
            color: #94a3b8;
            margin-bottom: 24px;
            font-size: 15px;
        }
        .download-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            margin: 16px 0;
        }
        .download-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .apk-url {
            background: #1e293b;
            padding: 10px;
            border-radius: 16px;
            font-size: 11px;
            word-break: break-all;
            color: #64748b;
            margin-top: 20px;
        }
        .loader {
            border: 3px solid #334155;
            border-top: 3px solid #10b981;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            margin: 20px 0;
            font-size: 14px;
        }
        .error {
            color: #f87171;
        }
        .success {
            color: #4ade80;
        }
        hr {
            border-color: #334155;
            margin: 20px 0;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        📱 Smart Parlour
    </h1>
    <div id="versionInfo" class="version">Loading...</div>
    <div class="info">
        A new version is ready for download.<br>
        Tap the button below to get the latest APK.
    </div>

    <button id="downloadButton" class="download-btn" disabled>⏳ Checking for update...</button>

    <div id="statusMessage" class="status"></div>
    <div id="apkUrlDisplay" class="apk-url"></div>
    <hr>
    <div style="font-size: 12px; color: #475569;">
        Direct download from GitHub Releases<br>
        Your data is secure.
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBDgK7qgbk3p5HN38Tq1siEgfvpPkUCmqA",
        authDomain: "smart-parlour-4d289.firebaseapp.com",
        projectId: "smart-parlour-4d289",
        storageBucket: "smart-parlour-4d289.firebasestorage.app",
        messagingSenderId: "559319368551",
        appId: "1:559319368551:android:43c6de3dc5ce33e37ea5c2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadUpdate() {
        const versionSpan = document.getElementById('versionInfo');
        const downloadBtn = document.getElementById('downloadButton');
        const statusDiv = document.getElementById('statusMessage');
        const urlDiv = document.getElementById('apkUrlDisplay');

        versionSpan.innerText = 'Fetching latest version...';
        downloadBtn.disabled = true;
        downloadBtn.innerText = '⏳ Loading...';

        try {
            const docRef = db.collection('app_config').doc('update');
            const doc = await docRef.get();

            if (!doc.exists) {
                throw new Error('No update configuration found. Please contact admin.');
            }

            const data = doc.data();
            const latestVersion = data.latestVersion || 'unknown';
            const apkUrl = data.apkDownloadUrl;

            if (!apkUrl || apkUrl.trim() === '') {
                throw new Error('APK download URL is missing. Admin needs to publish an update.');
            }

            versionSpan.innerText = `📦 Version ${latestVersion}`;
            urlDiv.innerText = `Download URL: ${apkUrl}`;

            downloadBtn.disabled = false;
            downloadBtn.innerText = `⬇️ Download APK v${latestVersion}`;
            downloadBtn.onclick = () => {
                // Start download directly
                window.location.href = apkUrl;
                statusDiv.innerHTML = '✅ Download started! Check your notifications.';
                statusDiv.className = 'status success';
            };
        } catch (err) {
            console.error(err);
            versionSpan.innerText = '⚠️ Update error';
            downloadBtn.disabled = true;
            downloadBtn.innerText = 'Update Unavailable';
            statusDiv.innerHTML = `❌ ${err.message}`;
            statusDiv.className = 'status error';
            urlDiv.innerText = '';
        }
    }

    loadUpdate();
</script>
</body>
</html>
