<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Smart Parlour – Staff QR Scanner</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px 20px 32px;
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { font-size: 28px; margin-bottom: 6px; color: #c084fc; }
        .sub { color: #94a3b8; margin-bottom: 24px; font-size: 14px; }
        input {
            width: 100%;
            padding: 14px;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 20px;
            font-size: 16px;
            color: white;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { color: #f87171; margin-top: 12px; font-size: 14px; background: #1e293b; padding: 10px; border-radius: 16px; }
        .info { margin-top: 20px; font-size: 12px; color: #64748b; }
        #reader { width: 100%; margin-top: 20px; border-radius: 20px; overflow: hidden; }
        .result {
            margin-top: 16px;
            padding: 12px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
        }
        .success { background: #10b981; color: white; }
        .error-msg { background: #ef4444; color: white; }
        .info-msg { background: #3b82f6; color: white; }
        .logout-btn { background: #475569; margin-top: 12px; }
        hr { margin: 20px 0; border-color: #334155; }
    </style>
</head>
<body>
<div class="card" id="appCard">
    <h1>📱 Smart Parlour</h1>
    <div id="loginView">
        <div class="sub">Enter your registered phone number</div>
        <input type="tel" id="phoneInput" placeholder="e.g., 9876543210" autocomplete="off">
        <button id="loginBtn">Login & Start Scanner</button>
        <div id="loginError" class="error" style="display: none;"></div>
        <div class="info">Use the same number that was added as staff in the app.</div>
    </div>

    <div id="scannerView" style="display: none;">
        <div class="sub">📷 Scan QR Code from Staff App</div>
        <div id="reader"></div>
        <div id="scanResult" class="result"></div>
        <button id="restartScannerBtn" class="logout-btn">Restart Scanner</button>
        <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBDgK7qgbk3p5HN38Tq1siEgfvpPkUCmqA",
        authDomain: "smart-parlour-4d289.firebaseapp.com",
        projectId: "smart-parlour-4d289",
        storageBucket: "smart-parlour-4d289.firebasestorage.app",
        messagingSenderId: "559319368551",
        appId: "1:559319368551:android:43c6de3dc5ce33e37ea5c2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let html5QrCode = null;
    let currentStaffId = null;
    let scanningActive = false;

    function showLoginError(msg) {
        const errDiv = document.getElementById('loginError');
        errDiv.innerText = msg;
        errDiv.style.display = 'block';
        setTimeout(() => errDiv.style.display = 'none', 4000);
    }

    function toDate(expiry) {
        if (!expiry) return null;
        if (typeof expiry.toDate === 'function') return expiry.toDate();
        if (expiry instanceof Date) return expiry;
        if (typeof expiry === 'string') return new Date(expiry);
        if (typeof expiry === 'number') return new Date(expiry);
        return null;
    }

    function calculateBonusPenalty(now) {
        const hours = now.getHours();
        const minutes = now.getMinutes();
        const totalMinutes = hours * 60 + minutes;

        if (totalMinutes >= 21*60) {
            return { bonus: 0, penalty: 0, status: 'Parlour Closed ❌', allowed: false, message: 'No attendance after 9:00 PM' };
        }
        if (totalMinutes < 9*60+30) {
            return { bonus: 0, penalty: 0, status: 'Parlour Closed ❌', allowed: false, message: 'Parlour opens at 9:30 AM' };
        }
        if (totalMinutes >= 9*60+30 && totalMinutes <= 10*60+20) {
            return { bonus: 5, penalty: 0, status: 'Early ✅', allowed: true, message: 'Attendance marked' };
        }
        const lateMinutes = totalMinutes - (10*60+20);
        let penalty = 0;
        if (lateMinutes <= 10) penalty = 10;
        else if (lateMinutes <= 25) penalty = 15;
        else if (lateMinutes <= 40) penalty = 20;
        else if (lateMinutes <= 70) penalty = 30;
        else if (lateMinutes <= 120) penalty = 40;
        else if (lateMinutes <= 180) penalty = 60;
        else if (lateMinutes <= 240) penalty = 80;
        else if (lateMinutes <= 300) penalty = 100;
        else if (lateMinutes <= 360) penalty = 120;
        else if (lateMinutes <= 420) penalty = 150;
        else penalty = 200;
        return { bonus: 0, penalty: penalty, status: 'Late ⏰', allowed: true, message: 'Attendance marked' };
    }

    async function isOnLeave(staffId, now) {
        const snapshot = await db.collection('leaves')
            .where('staffId', '==', staffId)
            .where('status', '==', 'approved')
            .get();
        for (let doc of snapshot.docs) {
            const start = doc.data().startDateTime?.toDate();
            const end = doc.data().endDateTime?.toDate();
            if (start && end && now >= start && now <= end) return true;
        }
        return false;
    }

    async function onScanSuccess(decodedText) {
        if (!scanningActive) return;
        scanningActive = false;
        if (html5QrCode) await html5QrCode.stop();
        const resultDiv = document.getElementById('scanResult');
        resultDiv.style.display = 'block';
        resultDiv.className = 'result info-msg';
        resultDiv.innerText = 'Verifying...';

        try {
            const qrData = JSON.parse(decodedText);
            const sessionId = qrData.sessionId;
            const scannedStaffId = qrData.staffId;

            if (scannedStaffId !== currentStaffId) {
                throw new Error('This QR code is not for you');
            }

            const qrDoc = await db.collection('qr_sessions').doc(sessionId).get();
            if (!qrDoc.exists) throw new Error('Invalid QR code');
            const session = qrDoc.data();

            const expiry = toDate(session.expiryTime);
            if (!expiry) throw new Error('Missing expiry time');
            if (new Date() > expiry) throw new Error('QR code expired (15s)');
            if (session.isUsed) throw new Error('QR code already used');

            await db.collection('qr_sessions').doc(sessionId).update({ isUsed: true, usedAt: new Date() });

            const now = new Date();
            const onLeave = await isOnLeave(currentStaffId, now);
            if (onLeave) throw new Error('You are on approved leave. No attendance required.');

            const { bonus, penalty, status, allowed, message } = calculateBonusPenalty(now);
            if (!allowed) throw new Error(message);

            const settingsDoc = await db.collection('settings').doc('appSettings').get();
            const defaultSalary = settingsDoc.data()?.defaultSalary || 15000;
            const workingDays = settingsDoc.data()?.workingDays || 26;
            const perDaySalary = Math.floor(defaultSalary / workingDays);
            const dailyEarning = perDaySalary + bonus - penalty;

            const date = now.toISOString().split('T')[0];
            const time = now.toLocaleTimeString();
            const dateDisplay = now.toLocaleDateString();
            const day = now.toLocaleDateString(undefined, { weekday: 'long' });

            await db.collection('attendance').add({
                staffId: session.staffId,
                staffName: session.staffName,
                date: date,
                dateDisplay: dateDisplay,
                day: day,
                time: time,
                status: status,
                bonus: bonus,
                penalty: penalty,
                dailyEarning: dailyEarning,
                timestamp: new Date()
            });

            const staffRef = db.collection('staff').doc(session.staffId);
            const staffDoc = await staffRef.get();
            const currentTotalDays = staffDoc.data()?.totalDays || 0;
            const currentTotalBonus = staffDoc.data()?.totalBonus || 0;
            const currentTotalPenalty = staffDoc.data()?.totalPenalty || 0;
            const currentTotalPresent = staffDoc.data()?.totalPresent || 0;

            await staffRef.update({
                isPresentToday: true,
                totalDays: currentTotalDays + 1,
                totalPresent: currentTotalPresent + 1,
                totalBonus: currentTotalBonus + bonus,
                totalPenalty: currentTotalPenalty + penalty,
                lastTime: time,
                lastDate: date,
            });

            resultDiv.innerHTML = '✅ Attendance marked successfully!';
            resultDiv.className = 'result success';
        } catch (err) {
            console.error(err);
            resultDiv.innerHTML = `❌ ${err.message}`;
            resultDiv.className = 'result error-msg';
        }
        setTimeout(() => {
            if (currentStaffId) {
                scanningActive = true;
                startScanner();
                resultDiv.style.display = 'none';
            }
        }, 3000);
    }

    function onScanError(err) { console.log(err); }

    async function startScanner() {
        if (!currentStaffId) return;
        if (html5QrCode) {
            try { await html5QrCode.stop(); } catch(e) {}
        }
        html5QrCode = new Html5Qrcode("reader");
        scanningActive = true;
        try {
            await html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 300, height: 300 } },
                onScanSuccess,
                onScanError
            );
        } catch(err) {
            const resultDiv = document.getElementById('scanResult');
            resultDiv.innerHTML = 'Camera error: ' + err.message;
            resultDiv.className = 'result error-msg';
            resultDiv.style.display = 'block';
            scanningActive = false;
        }
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop().catch(e=>console.log);
            html5QrCode = null;
        }
        scanningActive = false;
    }

    function logout() {
        stopScanner();
        currentStaffId = null;
        document.getElementById('loginView').style.display = 'block';
        document.getElementById('scannerView').style.display = 'none';
        document.getElementById('phoneInput').value = '';
        const resultDiv = document.getElementById('scanResult');
        resultDiv.style.display = 'none';
        resultDiv.innerHTML = '';
    }

    document.getElementById('loginBtn').onclick = async () => {
        const phone = document.getElementById('phoneInput').value.trim();
        const btn = document.getElementById('loginBtn');
        const originalText = btn.innerText;
        btn.disabled = true;
        btn.innerText = 'Verifying...';
        try {
            if (!phone) throw new Error('Please enter phone number');
            const staffQuery = await db.collection('staff').where('phone', '==', phone).limit(1).get();
            if (staffQuery.empty) throw new Error('Phone number not registered');
            const staffDoc = staffQuery.docs[0];
            currentStaffId = staffDoc.id;
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('scannerView').style.display = 'block';
            startScanner();
        } catch (err) {
            showLoginError(err.message);
            btn.disabled = false;
            btn.innerText = originalText;
        }
    };

    document.getElementById('restartScannerBtn').onclick = () => {
        if (currentStaffId) {
            stopScanner();
            startScanner();
            const resultDiv = document.getElementById('scanResult');
            resultDiv.style.display = 'none';
            resultDiv.className = 'result';
        }
    };
    document.getElementById('logoutBtn').onclick = logout;
</script>
</body>
</html>
