<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Smart Parlour – Staff QR Scanner</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* Card Container */
        .card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 28px 24px 36px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
        }

        /* Header */
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #c084fc, #a855f7);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .sub {
            color: #94a3b8;
            margin-bottom: 28px;
            font-size: 14px;
            font-weight: 500;
        }

        /* Input Field */
        input {
            width: 100%;
            padding: 16px 18px;
            background: #1e293b;
            border: 1.5px solid #334155;
            border-radius: 28px;
            font-size: 16px;
            color: #f1f5f9;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
        }

        /* Button */
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.3);
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(16, 185, 129, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Logout button */
        .logout-btn {
            background: linear-gradient(135deg, #475569, #334155);
            box-shadow: none;
            margin-top: 12px;
        }

        .logout-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #64748b, #475569);
            transform: translateY(-2px);
        }

        /* Error & Info */
        .error {
            color: #f87171;
            margin-top: 14px;
            font-size: 14px;
            background: rgba(239, 68, 68, 0.1);
            padding: 12px;
            border-radius: 24px;
            border-left: 3px solid #ef4444;
            text-align: left;
        }

        .info {
            margin-top: 20px;
            font-size: 12px;
            color: #64748b;
            text-align: center;
        }

        /* QR Scanner Container */
        #reader {
            width: 100%;
            margin-top: 20px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        /* Result Messages */
        .result {
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 28px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success {
            background: #10b981;
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .error-msg {
            background: #ef4444;
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .info-msg {
            background: #3b82f6;
            color: white;
        }

        /* Staff Name Display */
        .staff-info {
            background: rgba(168, 85, 247, 0.15);
            border-radius: 32px;
            padding: 12px 18px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #c084fc;
            font-weight: 500;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 20px 18px 28px;
            }
            h1 {
                font-size: 28px;
            }
            button {
                padding: 14px;
            }
            input {
                padding: 14px 16px;
            }
        }

        /* Loading spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="card" id="appCard">
    <h1>✨ Smart Parlour</h1>
    <div id="loginView">
        <div class="sub">Staff Login</div>
        <input type="tel" id="phoneInput" placeholder="📞 10-digit phone number" autocomplete="off" inputmode="numeric">
        <button id="loginBtn">🔐 Login & Start Scanner</button>
        <div id="loginError" class="error" style="display: none;"></div>
        <div class="info">Use the same number registered in the app</div>
    </div>

    <div id="scannerView" style="display: none;">
        <div class="staff-info" id="staffNameDisplay"></div>
        <div class="sub">📷 Scan QR Code</div>
        <div id="reader"></div>
        <div id="scanResult" class="result"></div>
        <button id="restartScannerBtn" class="logout-btn">🔄 Restart Scanner</button>
        <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBDgK7qgbk3p5HN38Tq1siEgfvpPkUCmqA",
        authDomain: "smart-parlour-4d289.firebaseapp.com",
        projectId: "smart-parlour-4d289",
        storageBucket: "smart-parlour-4d289.firebasestorage.app",
        messagingSenderId: "559319368551",
        appId: "1:559319368551:android:43c6de3dc5ce33e37ea5c2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let html5QrCode = null;
    let currentStaffId = null;
    let currentStaffName = null;
    let scanningActive = false;

    function showLoginError(msg) {
        const errDiv = document.getElementById('loginError');
        errDiv.innerText = msg;
        errDiv.style.display = 'block';
        setTimeout(() => errDiv.style.display = 'none', 4000);
    }

    function toDate(expiry) {
        if (!expiry) return null;
        if (typeof expiry.toDate === 'function') return expiry.toDate();
        if (expiry instanceof Date) return expiry;
        if (typeof expiry === 'string') return new Date(expiry);
        if (typeof expiry === 'number') return new Date(expiry);
        return null;
    }

    function calculateBonusPenalty(now) {
        const hours = now.getHours();
        const minutes = now.getMinutes();
        const totalMinutes = hours * 60 + minutes;

        if (totalMinutes >= 21*60) {
            return { bonus: 0, penalty: 0, status: 'Parlour Closed ❌', allowed: false, message: 'Parlour closed after 9:00 PM' };
        }
        if (totalMinutes < 9*60+30) {
            return { bonus: 0, penalty: 0, status: 'Parlour Closed ❌', allowed: false, message: 'Opens at 9:30 AM' };
        }
        if (totalMinutes >= 9*60+30 && totalMinutes <= 10*60+20) {
            return { bonus: 5, penalty: 0, status: 'Early ✅', allowed: true, message: 'Bonus +₹5' };
        }
        const lateMinutes = totalMinutes - (10*60+20);
        let penalty = 0;
        if (lateMinutes <= 10) penalty = 10;
        else if (lateMinutes <= 25) penalty = 15;
        else if (lateMinutes <= 40) penalty = 20;
        else if (lateMinutes <= 70) penalty = 30;
        else if (lateMinutes <= 120) penalty = 40;
        else if (lateMinutes <= 180) penalty = 60;
        else if (lateMinutes <= 240) penalty = 80;
        else if (lateMinutes <= 300) penalty = 100;
        else if (lateMinutes <= 360) penalty = 120;
        else if (lateMinutes <= 420) penalty = 150;
        else penalty = 200;
        return { bonus: 0, penalty: penalty, status: 'Late ⏰', allowed: true, message: `Penalty -₹${penalty}` };
    }

    async function isOnLeave(staffId, now) {
        const snapshot = await db.collection('leaves')
            .where('staffId', '==', staffId)
            .where('status', '==', 'approved')
            .get();
        for (let doc of snapshot.docs) {
            const start = doc.data().startDateTime?.toDate();
            const end = doc.data().endDateTime?.toDate();
            if (start && end && now >= start && now <= end) return true;
        }
        return false;
    }

    async function isMonthlyHoliday(staffId, now) {
        const staffDoc = await db.collection('staff').doc(staffId).get();
        if (!staffDoc.exists) return false;
        const monthlyHolidays = staffDoc.data()?.monthlyHolidays || [];
        const todayDate = now.getDate();
        return monthlyHolidays.includes(todayDate);
    }

    async function onScanSuccess(decodedText) {
        if (!scanningActive) return;
        scanningActive = false;
        if (html5QrCode) await html5QrCode.stop();
        const resultDiv = document.getElementById('scanResult');
        resultDiv.style.display = 'block';
        resultDiv.className = 'result info-msg';
        resultDiv.innerHTML = '<span class="loading-spinner"></span> Verifying...';

        try {
            const qrData = JSON.parse(decodedText);
            const sessionId = qrData.sessionId;
            const scannedStaffId = qrData.staffId;

            if (scannedStaffId !== currentStaffId) {
                throw new Error('This QR code is not for you');
            }

            const qrDoc = await db.collection('qr_sessions').doc(sessionId).get();
            if (!qrDoc.exists) throw new Error('Invalid QR code');
            const session = qrDoc.data();

            const expiry = toDate(session.expiryTime);
            if (!expiry) throw new Error('Missing expiry time');
            if (new Date() > expiry) throw new Error('QR code expired (15s)');
            if (session.isUsed) throw new Error('QR code already used');

            await db.collection('qr_sessions').doc(sessionId).update({ isUsed: true, usedAt: new Date() });

            const now = new Date();
            
            const isHoliday = await isMonthlyHoliday(currentStaffId, now);
            if (isHoliday) throw new Error('Monthly holiday – No attendance required');
            
            const onLeave = await isOnLeave(currentStaffId, now);
            if (onLeave) throw new Error('Approved leave – No attendance required');

            const { bonus, penalty, status, allowed, message } = calculateBonusPenalty(now);
            if (!allowed) throw new Error(message);

            const settingsDoc = await db.collection('settings').doc('appSettings').get();
            const defaultSalary = settingsDoc.data()?.defaultSalary || 15000;
            const workingDays = settingsDoc.data()?.workingDays || 26;
            const perDaySalary = Math.floor(defaultSalary / workingDays);
            const dailyEarning = perDaySalary + bonus - penalty;

            const date = now.toISOString().split('T')[0];
            const time = now.toLocaleTimeString();
            const dateDisplay = now.toLocaleDateString();
            const day = now.toLocaleDateString(undefined, { weekday: 'long' });

            await db.collection('attendance').add({
                staffId: session.staffId,
                staffName: session.staffName,
                date: date,
                dateDisplay: dateDisplay,
                day: day,
                time: time,
                status: status,
                bonus: bonus,
                penalty: penalty,
                dailyEarning: dailyEarning,
                timestamp: new Date()
            });

            const staffRef = db.collection('staff').doc(session.staffId);
            const staffDoc = await staffRef.get();
            await staffRef.update({
                isPresentToday: true,
                totalDays: (staffDoc.data()?.totalDays || 0) + 1,
                totalPresent: (staffDoc.data()?.totalPresent || 0) + 1,
                totalBonus: (staffDoc.data()?.totalBonus || 0) + bonus,
                totalPenalty: (staffDoc.data()?.totalPenalty || 0) + penalty,
                lastTime: time,
                lastDate: date,
            });

            resultDiv.innerHTML = `✅ Attendance marked!<br>📅 ${dateDisplay}<br>⏰ ${time}<br>📊 ${status}<br>💰 Daily Earning: ₹${dailyEarning}`;
            resultDiv.className = 'result success';
        } catch (err) {
            console.error(err);
            resultDiv.innerHTML = `❌ ${err.message}`;
            resultDiv.className = 'result error-msg';
        }
        setTimeout(() => {
            if (currentStaffId) {
                scanningActive = true;
                startScanner();
                resultDiv.style.display = 'none';
            }
        }, 4000);
    }

    function onScanError(err) { console.log(err); }

    async function startScanner() {
        if (!currentStaffId) return;
        if (html5QrCode) {
            try { await html5QrCode.stop(); } catch(e) {}
        }
        html5QrCode = new Html5Qrcode("reader");
        scanningActive = true;
        try {
            await html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 300, height: 300 } },
                onScanSuccess,
                onScanError
            );
        } catch(err) {
            const resultDiv = document.getElementById('scanResult');
            resultDiv.innerHTML = 'Camera error: ' + err.message;
            resultDiv.className = 'result error-msg';
            resultDiv.style.display = 'block';
            scanningActive = false;
        }
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop().catch(e=>console.log);
            html5QrCode = null;
        }
        scanningActive = false;
    }

    function logout() {
        stopScanner();
        currentStaffId = null;
        currentStaffName = null;
        document.getElementById('loginView').style.display = 'block';
        document.getElementById('scannerView').style.display = 'none';
        document.getElementById('phoneInput').value = '';
        const resultDiv = document.getElementById('scanResult');
        resultDiv.style.display = 'none';
        resultDiv.innerHTML = '';
    }

    document.getElementById('loginBtn').onclick = async () => {
        const phone = document.getElementById('phoneInput').value.trim();
        const btn = document.getElementById('loginBtn');
        const originalText = btn.innerText;
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> Verifying...';
        try {
            if (!phone) throw new Error('Please enter phone number');
            const staffQuery = await db.collection('staff').where('phone', '==', phone).limit(1).get();
            if (staffQuery.empty) throw new Error('Phone number not registered');
            const staffDoc = staffQuery.docs[0];
            currentStaffId = staffDoc.id;
            currentStaffName = staffDoc.data().name;
            document.getElementById('staffNameDisplay').innerHTML = `👋 Welcome, ${currentStaffName}`;
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('scannerView').style.display = 'block';
            startScanner();
        } catch (err) {
            showLoginError(err.message);
            btn.disabled = false;
            btn.innerText = originalText;
        }
    };

    document.getElementById('restartScannerBtn').onclick = () => {
        if (currentStaffId) {
            stopScanner();
            startScanner();
            const resultDiv = document.getElementById('scanResult');
            resultDiv.style.display = 'none';
            resultDiv.innerHTML = '';
        }
    };
    document.getElementById('logoutBtn').onclick = logout;

    // Auto-focus on phone input
    document.getElementById('phoneInput').focus();
</script>
</body>
</html>
