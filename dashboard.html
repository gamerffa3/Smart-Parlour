<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parlour – Login</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { font-size: 28px; margin-bottom: 8px; color: #1a1a2e; }
        .sub { color: #666; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .error { color: #d33; margin-top: 15px; font-size: 14px; }
        .info { margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📱 Smart Parlour</h1>
        <div class="sub">Login with your registered phone number</div>
        <input type="tel" id="phoneInput" placeholder="e.g., 9876543210" autocomplete="off">
        <button id="loginBtn">Login & Scan QR</button>
        <div id="errorMsg" class="error"></div>
        <div class="info">Use the same number that was added as staff in the app.</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBDgK7qgbk3p5HN38Tq1siEgfvpPkUCmqA",
            authDomain: "smart-parlour-4d289.firebaseapp.com",
            projectId: "smart-parlour-4d289",
            storageBucket: "smart-parlour-4d289.firebasestorage.app",
            messagingSenderId: "559319368551",
            appId: "1:559319368551:android:43c6de3dc5ce33e37ea5c2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function login() {
            const phone = document.getElementById('phoneInput').value.trim();
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMsg');
            if (!phone) { errorDiv.innerText = 'Please enter phone number'; return; }
            btn.disabled = true; btn.innerText = 'Verifying...';
            errorDiv.innerText = '';
            try {
                const staffQuery = await db.collection('staff').where('phone', '==', phone).limit(1).get();
                if (staffQuery.empty) throw new Error('Phone number not registered in staff list');
                const staffDoc = staffQuery.docs[0];
                const staffData = staffDoc.data();
                localStorage.setItem('staffId', staffDoc.id);
                localStorage.setItem('staffName', staffData.name);
                localStorage.setItem('staffPhone', phone);
                window.location.href = 'scanner.html';
            } catch (err) {
                errorDiv.innerText = err.message;
                btn.disabled = false; btn.innerText = 'Login & Scan QR';
            }
        }
        document.getElementById('loginBtn').onclick = login;
        document.getElementById('phoneInput').addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
    </script>
</body>
</html>
